const NUMS={pt:["um|oong","dois|doysh","três|traysh","quatro|KWA-troo","cinco|SEEN-koo","seis|saysh","sete|SEH-teh","oito|OY-too","nove|NOH-veh","dez|desh"],

const FOODG=["Proteins","Staples","Drinks & table","Useful words"];
const GEST=[
 {i:"ti-number-1",t:"Counting starts on the thumb",d:"For \"one,\" hold up your thumb — not your index finger. An index finger held up reads as \"two\" to locals. Matters when ordering or paying."},
 {i:"ti-hand-stop",t:"\"No\" with a chin lift",d:"You'll see locals tip the chin up with a small tongue click to mean \"no.\" You don't have to use it, but recognizing it helps."},
 {i:"ti-heart",t:"Thank with a hand on the heart",d:"Saying obrigado / gracias with your palm briefly on your chest reads as warm and sincere. Universally appreciated."},
 {i:"ti-arrow-down",t:"\"Come here\" — palm down",d:"Beckon with your palm facing DOWN, fingers sweeping toward you. The American palm-up curl reads as rude or worse here."},
 {i:"ti-eye",t:"Catching a server — eye + raised hand",d:"Make eye contact and lift a hand slightly. Never snap your fingers or call out — both read as rude, especially in Portugal."},
 {i:"ti-hand-off",t:"\"Just looking\" wave-off",d:"At markets and with street vendors, an open palm and a small side-to-side wave politely says \"no thanks\" without a word."},
 {i:"ti-wave-saw-tool",t:"\"So-so\" hand wobble",d:"Flat hand, wobble side to side for \"more or less\" — mais ou menos / más o menos. Handy when words run out."}
];
const CATS=[
 {k:"Greetings",i:"ti-hand-stop"},{k:"Dining",i:"ti-tools-kitchen-2"},{k:"Food",i:"ti-bread"},{k:"Navigation",i:"ti-map-pin"},
 {k:"Shopping",i:"ti-shopping-bag"},{k:"Hotel",i:"ti-bed"},{k:"Time",i:"ti-clock"},
 {k:"Numbers",i:"ti-number-9"},{k:"Gestures",i:"ti-hand-finger"}
];
const ESS={pt:[["Thanks","Obrigado"],["Excuse me","Desculpe"],["English?","Fala inglês?"],["The check","A conta, por favor"],["Help!","Socorro!"]],
es:[["Thanks","Gracias"],["Excuse me","Perdone"],["English?","¿Habla inglés?"],["The check","La cuenta, por favor"],["Help!","¡Socorro!"]]};
let lang="pt",cat="Greetings",emOpen=false;
function clean(t){return t.replace(/\([^)]*\)/g,"").replace(/\[[^\]]*\]/g,"").replace(/…|\.\.\./g,"").trim();}
function esc(s){return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function speak(native){
 if(!window.speechSynthesis)return;window.speechSynthesis.cancel();
 clean(native).split("/").map(s=>s.trim()).filter(Boolean).forEach(part=>{
  const u=new SpeechSynthesisUtterance(part);u.lang=lang==="pt"?"pt-PT":"es-ES";u.rate=.85;window.speechSynthesis.speak(u);});
}
function isHalf(c){return c.e.length<=22;}
function setLang(l){lang=l;render();}
function toggleEm(){emOpen=!emOpen;renderEm();}
function renderEm(){
 const body=document.getElementById("embody"),chev=document.getElementById("emchev"),hint=document.getElementById("emhint");
 if(emOpen){
  body.style.display="flex";chev.classList.add("open");hint.textContent="tap to close";
  body.innerHTML=D[lang].Emergency.map(c=>`<div class="emchip" onclick="speak('${esc(c.n)}')"><div class="en">${c.e}</div><div class="na">${c.n}</div></div>`).join("");
 }else{body.style.display="none";chev.classList.remove("open");hint.textContent="tap to open";}
}
function render(){
 const isPt=lang==="pt";
 document.getElementById("lb-pt").className="langbtn"+(isPt?" on-pt":"");
 document.getElementById("lb-es").className="langbtn"+(!isPt?" on-es":"");
 const ess=document.getElementById("ess");
 ess.className="essentials "+(isPt?"ess-pt":"ess-es");
 ess.innerHTML='<div class="ess-label"><i class="ti ti-star" aria-hidden="true"></i>Essentials</div><div class="ess-grid">'+ESS[lang].map(e=>`<div class="chip" onclick="speak('${esc(e[1])}')"><div class="en">${e[0]}</div><div class="na">${e[1]}</div></div>`).join("")+'</div>';
 renderEm();
 document.getElementById("pills").innerHTML=CATS.map(c=>`<button class="pill${cat===c.k?(isPt?" on-pt":" on-es"):""}" onclick="setCat('${c.k}')"><i class="ti ${c.i}" aria-hidden="true"></i>${c.k}</button>`).join("");
 const ct=document.getElementById("count"),content=document.getElementById("content"),s=isPt?"s-pt":"s-es";
 if(cat==="Gestures"){ct.textContent="";content.innerHTML=GEST.map(g=>`<div class="gcard"><i class="ti ${g.i} gicon" aria-hidden="true"></i><div><div class="gt">${g.t}</div><div class="gd">${g.d}</div></div></div>`).join("");return;}
 if(cat==="Numbers"){ct.textContent="";content.innerHTML='<div class="numwrap">'+NUMS[lang].map((x,i)=>{const[w,p]=x.split("|");return`<div class="num" onclick="speak('${esc(w)}')"><div class="d">${i+1}</div><div class="w">${w}</div><div class="np">${p}</div></div>`;}).join("")+'</div>';return;}
 if(cat==="Food"){ct.textContent="";content.innerHTML=FOODG.map(g=>{const items=D[lang].Food[g]||[];return`<div class="fglabel">${g}</div><div class="fgrid">`+items.map(it=>`<div class="ftile" onclick="speak('${esc(it.n)}')"><div class="fe">${it.e}</div><div class="fn">${it.n}</div><div class="fp">${it.p}</div></div>`).join("")+`</div>`;}).join("");return;}
 const list=D[lang][cat]||[];
 ct.textContent=list.length+" phrases";
 content.innerHTML='<div class="grid2">'+list.map(c=>`<div class="card${isHalf(c)?"":" full"}" onclick="speak('${esc(c.n)}')"><div class="stripe ${s}"></div><div class="cb"><div class="na">${c.n}</div><div class="pr">${c.p}</div><div class="en">${c.e}</div></div><i class="ti ti-volume gicon spk" aria-hidden="true"></i></div>`).join("")+"</div>";
}
function setCat(c){cat=c;render();}
render();
</script>
